<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Team — Revizto ↔ ACC Sync</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div id="sidebar-mount"></div>
  <div id="app" class="container">
    <header class="app-header">
      <h1>Team <span class="badge badge-warning">Admin</span></h1>
      <p class="app-sub">Invite people and set their role. Admin can manage project setup and team; Standard can view/sync issues and connect their own accounts.</p>
    </header>

    <section class="card">
      <h2>Add someone</h2>
      <div id="email-config-notice" class="hint"></div>
      <form id="invite-form" class="invite-form">
        <input id="invite-email" type="email" placeholder="teammate@company.com" required />
        <select id="invite-role">
          <option value="standard">Standard</option>
          <option value="admin">Admin</option>
        </select>
        <label><input type="checkbox" id="invite-send-email" /> Send them an invite email</label>
        <button type="submit" class="btn">Add</button>
      </form>
      <div id="invite-result" class="result-text"></div>
    </section>

    <section class="card">
      <h2>Members</h2>
      <table class="team-table">
        <thead>
          <tr><th>Email</th><th>Role</th><th>Added</th><th></th></tr>
        </thead>
        <tbody id="team-rows"></tbody>
      </table>
    </section>
  </div>
  <script src="/js/nav.js"></script>
  <script src="/js/team.js"></script>
</body>
</html>
